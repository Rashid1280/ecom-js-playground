<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    
    h2 { margin-bottom: 10px; }
    
    .form { 
      margin-bottom: 30px; 
      background: white; 
      padding: 15px; 
      border-radius: 8px;
      width: 300px;
    }
    
    .form input { 
      display: block; padding: 8px; 
      margin-bottom: 10px; width: 100%; 
      border: 1px solid #ccc; border-radius: 4px; 
    }
    
    .form button { 
      padding: 8px 16px; background: #4CAF50; 
      color: white; border: none; 
      border-radius: 4px; cursor: pointer; 
    }

    #message { margin-bottom: 20px; color: green; font-weight: bold; }
    
    #loading { color: #888; margin-bottom: 10px; }

    .products { display: flex; gap: 15px; flex-wrap: wrap; }
    
    .card { 
      background: white; padding: 15px; 
      border-radius: 8px; width: 160px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
    }
    
    .card h3 { margin: 0 0 8px; font-size: 14px; }
    .card p { margin: 0; color: #555; }
  </style>
</head>
<body>

  <h2>Add Product</h2>
  <div class="form">
    <input type="text" id="productName" placeholder="Product name"/>
    <input type="number" id="productPrice" placeholder="Price"/>
    <button id="addBtn">Add Product</button>
  </div>

  <div id="message"></div>

  <h2>Products</h2>
  <div id="loading">Loading products...</div>
  <div class="products" id="productList"></div>

  <script>
    
    const loading = document.querySelector(`#loading`);
    const productList = document.querySelector(`#productList`);

    async function getOrder() {
loading.textContent = "Loading products...";
try {
     const response = await fetch(`https://dummyjson.com/products?limit=5`);
        const data = await response.json();
        loading.textContent = "";

        data.products.forEach(item => {
            productList.innerHTML += `<div class="card">
          <h3>${item.title}</h3>
          <p>₹${item.price}</p>
        </div>`
        });
} 
       
catch (error) {
    loading.textContent =`${error}`
}
    }

     getOrder()




  </script>

</body>
</html>
