<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    
    .search-bar { 
      padding: 8px; width: 300px; 
      margin-bottom: 20px; border: 1px solid #ccc; 
      border-radius: 5px; 
    }
    
    .products { display: flex; gap: 15px; flex-wrap: wrap; }
    
    .card { 
      background: white; padding: 15px; 
      border-radius: 8px; width: 150px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
    }
    
    .card h3 { margin: 0 0 8px; }
    .card p { margin: 0 0 10px; color: #555; }
    
    .add-btn { 
      padding: 6px 12px; background: #4CAF50; 
      color: white; border: none; 
      border-radius: 4px; cursor: pointer; 
    }
    
    .cart-count { 
      font-size: 20px; font-weight: bold; 
      margin-bottom: 20px; 
    }
  </style>
</head>
<body>

  <div class="cart-count">Cart: <span id="count">0</span> items</div>

  <input class="search-bar" type="text" id="search" placeholder="Search products..."/>

  <div class="products" id="productList">
    <div class="card">
      <h3>Bottle</h3><p>₹100</p>
      <button class="add-btn">Add to Cart</button>
    </div>
    <div class="card">
      <h3>Glass</h3><p>₹50</p>
      <button class="add-btn">Add to Cart</button>
    </div>
    <div class="card">
      <h3>Pillow</h3><p>₹150</p>
      <button class="add-btn">Add to Cart</button>
    </div>
    <div class="card">
      <h3>Comb</h3><p>₹20</p>
      <button class="add-btn">Add to Cart</button>
    </div>
    <div class="card">
      <h3>Camera</h3><p>₹1000</p>
      <button class="add-btn">Add to Cart</button>
    </div>
  </div>

  <script>

let btn = document.querySelectorAll(".add-btn")
let counts = document.querySelector('#count')


btn.forEach((item)=>{
    item.addEventListener("click" , (event)=>{
     console.log(event);
    counts.textContent++
})     
    })
    

  </script>

</body>
</html>
